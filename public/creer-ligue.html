<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thinkless – Créer une ligue</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-950 min-h-screen text-white">
    <nav
      class="bg-gray-900 px-6 py-4 flex justify-between items-center border-b border-gray-800"
    >
      <a href="/index.html" class="text-xl font-bold text-indigo-400"
        >Thinkless</a
      >
      <div class="flex items-center gap-4">
        <button
          onclick="window.location.href = '/ligues.html'"
          class="text-sm text-gray-400 hover:text-white transition"
        >
          ← Retour
        </button>
        <button
          onclick="logout()"
          class="text-sm text-red-400 hover:text-red-300 transition"
        >
          Déconnexion
        </button>
      </div>
    </nav>

    <main class="max-w-2xl mx-auto px-4 py-10">
      <h2 class="text-2xl font-bold mb-2">Créer une ligue</h2>
      <p id="step-indicator" class="text-gray-400 text-sm mb-6"></p>

      <div class="bg-gray-900 rounded-2xl p-6 border border-gray-800">
        <!-- Étape 1 -->
        <div id="step1" class="space-y-4">
          <h3 class="text-lg font-bold mb-4">Infos de la ligue</h3>

          <div>
            <label class="block text-gray-400 text-sm mb-1"
              >Nom de la ligue</label
            >
            <input
              id="nom"
              type="text"
              placeholder="Ex: Ligue des collègues"
              class="w-full bg-gray-800 text-white rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-indigo-500"
            />
          </div>

          <div>
            <label class="block text-gray-400 text-sm mb-1">Description</label>
            <textarea
              id="description"
              placeholder="Décris ta ligue..."
              rows="3"
              class="w-full bg-gray-800 text-white rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-indigo-500"
            ></textarea>
          </div>

          <div class="flex items-center gap-3">
            <input
              id="publique"
              type="checkbox"
              class="w-4 h-4 accent-indigo-500"
            />
            <label class="text-gray-400 text-sm"
              >Ligue publique (visible par tous)</label
            >
          </div>

          <div
            id="code-privee-info"
            class="hidden bg-gray-800 rounded-lg px-4 py-3 text-sm text-gray-300"
          >
            ℹ️ Les joueurs devront entrer un code pour rejoindre cette ligue et
            choisir leur équipe.
          </div>
        </div>

        <!-- Étape 2 -->
        <div id="step2" class="hidden space-y-4">
          <h3 class="text-lg font-bold mb-4">Choisir le sport</h3>
          <select
            id="sport_id"
            class="w-full bg-gray-800 text-white rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-indigo-500"
          >
            <option value="">Chargement...</option>
          </select>
        </div>

        <!-- Étape 3 (si privée) -->
        <div id="step3" class="hidden space-y-4">
          <h3 class="text-lg font-bold mb-4">Configuration des équipes</h3>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-gray-400 text-sm mb-1"
                >Nombre d'équipes</label
              >
              <input
                id="nb_equipe"
                type="number"
                min="2"
                max="10"
                value="2"
                class="w-full bg-gray-800 text-white rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-indigo-500"
              />
            </div>
            <div>
              <label class="block text-gray-400 text-sm mb-1"
                >Slots par équipe</label
              >
              <input
                id="slots_par_equipe"
                type="number"
                min="1"
                max="20"
                value="5"
                class="w-full bg-gray-800 text-white rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-indigo-500"
              />
            </div>
          </div>

          <div>
            <label class="block text-gray-400 text-sm mb-2"
              >Noms des équipes</label
            >
            <div id="equipes-list" class="space-y-2"></div>
          </div>

          <p class="text-gray-500 text-xs">
            Les joueurs rejoindront une ligue en entrant le code d'accès et en
            choisissant leur équipe.
          </p>
        </div>

        <!-- Erreur -->
        <p id="error" class="text-red-400 text-sm mt-3 text-center hidden"></p>
        <p
          id="success"
          class="text-green-400 text-sm mt-3 text-center hidden"
        ></p>

        <!-- Navigation -->
        <div class="flex gap-3 mt-6">
          <button
            id="btn-prev"
            onclick="prevStep()"
            class="hidden flex-1 bg-gray-700 hover:bg-gray-600 text-white font-semibold py-2 rounded-lg transition"
          >
            ← Retour
          </button>
          <button
            id="btn-next"
            onclick="nextStep()"
            class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 rounded-lg transition"
          >
            Suivant →
          </button>
          <button
            id="btn-create"
            onclick="creerLigue()"
            class="hidden flex-1 bg-green-600 hover:bg-green-700 text-white font-semibold py-2 rounded-lg transition"
          >
            ✓ Créer la ligue
          </button>
        </div>
      </div>
    </main>

    <script>
      const token = localStorage.getItem("token");
      if (!token) window.location.href = "/login.html";

      const SOLO_SPORTS = new Set(["tennis", "badminton", "padel"]);
      let currentStep = 1;
      const totalSteps = 3;
      let equipesNames = [];
      let allSports = [];

      function logout() {
        localStorage.clear();
        window.location.href = "/login.html";
      }

      function updateStepIndicator() {
        document.getElementById("step-indicator").textContent =
          `Étape ${currentStep} sur ${totalSteps}`;
      }

      function checkIfSoloSport(sportId) {
        const sport = allSports.find((s) => s.id === sportId);
        if (!sport) return false;
        const sportName = sport.nom
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "");
        return SOLO_SPORTS.has(sportName);
      }

      function updateUI() {
        document
          .getElementById("step1")
          .classList.toggle("hidden", currentStep !== 1);
        document
          .getElementById("step2")
          .classList.toggle("hidden", currentStep !== 2);

        const isPrivate = !document.getElementById("publique").checked;
        const selectedSportId = parseInt(
          document.getElementById("sport_id").value,
        );
        const isSoloSelected = checkIfSoloSport(selectedSportId);

        // Pour les sports solo, pas de step 3
        const hasStep3 = isPrivate && !isSoloSelected;
        document
          .getElementById("step3")
          .classList.toggle("hidden", currentStep !== 3 || !hasStep3);
        document
          .getElementById("code-privee-info")
          .classList.toggle("hidden", isPrivate === false);

        document
          .getElementById("btn-prev")
          .classList.toggle("hidden", currentStep === 1);
        document
          .getElementById("btn-next")
          .classList.toggle(
            "hidden",
            currentStep === totalSteps ||
              (currentStep === 2 && hasStep3 === false),
          );
        document
          .getElementById("btn-create")
          .classList.toggle(
            "hidden",
            !(
              currentStep === totalSteps ||
              (currentStep === 2 && hasStep3 === false)
            ),
          );

        updateStepIndicator();
      }

      function renderEquipesInputs() {
        const nb = parseInt(document.getElementById("nb_equipe").value) || 2;
        const container = document.getElementById("equipes-list");

        if (equipesNames.length !== nb) {
          equipesNames = Array(nb)
            .fill(null)
            .map(
              (_, i) =>
                document.getElementById(`equipe-name-${i}`)?.value ||
                `Équipe ${String.fromCharCode(65 + i)}`,
            );
        }

        container.innerHTML = equipesNames
          .map(
            (name, i) => `
          <input
            id="equipe-name-${i}"
            type="text"
            value="${name}"
            placeholder="Nom équipe ${i + 1}"
            class="w-full bg-gray-800 text-white rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-indigo-500"
          />
        `,
          )
          .join("");

        document
          .querySelectorAll("[id^='equipe-name-']")
          .forEach((input, i) => {
            input.addEventListener("change", (e) => {
              equipesNames[i] = e.target.value;
            });
          });
      }

      function nextStep() {
        const isPrivate = !document.getElementById("publique").checked;
        const selectedSportId = parseInt(
          document.getElementById("sport_id").value,
        );
        const isSoloSelected = checkIfSoloSport(selectedSportId);

        const maxStep = isPrivate && !isSoloSelected ? 3 : 2;

        if (currentStep < maxStep) {
          if (currentStep === 2 && isPrivate && !isSoloSelected) {
            renderEquipesInputs();
          }
          currentStep++;
          updateUI();
        }
      }

      function prevStep() {
        if (currentStep > 1) currentStep--;
        updateUI();
      }

      async function loadSports() {
        const res = await fetch("/api/sports", {
          headers: { Authorization: `Bearer ${token}` },
        });
        allSports = await res.json();
        document.getElementById("sport_id").innerHTML = allSports
          .map((s) => `<option value="${s.id}">${s.nom}</option>`)
          .join("");
      }

      async function creerLigue() {
        const error = document.getElementById("error");
        const success = document.getElementById("success");
        error.classList.add("hidden");
        success.classList.add("hidden");

        const isPrivate = !document.getElementById("publique").checked;

        const body = {
          sport_id: parseInt(document.getElementById("sport_id").value),
          nom: document.getElementById("nom").value,
          description: document.getElementById("description").value,
          publique: document.getElementById("publique").checked,
          nb_equipe: isPrivate
            ? parseInt(document.getElementById("nb_equipe").value)
            : null,
          slots_par_equipe: isPrivate
            ? parseInt(document.getElementById("slots_par_equipe").value)
            : null,
          equipes: isPrivate ? equipesNames : null,
        };

        const res = await fetch("/api/ligues", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`,
          },
          body: JSON.stringify(body),
        });

        const data = await res.json();

        if (res.ok) {
          success.textContent = "Ligue créée ! Redirection...";
          success.classList.remove("hidden");
          setTimeout(() => (window.location.href = "/ligues.html"), 1500);
        } else {
          error.textContent = data.message;
          error.classList.remove("hidden");
        }
      }

      document.getElementById("publique").addEventListener("change", updateUI);
      document
        .getElementById("nb_equipe")
        .addEventListener("change", renderEquipesInputs);
      document.getElementById("sport_id").addEventListener("change", updateUI);

      loadSports();
      updateUI();
    </script>
  </body>
</html>
