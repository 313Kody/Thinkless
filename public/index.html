<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thinkless – Matchs</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-950 min-h-screen text-white">
    <!-- Modal rejoindre match privé -->
    <div
      id="modal-code-match"
      class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50"
    >
      <div
        class="bg-gray-900 rounded-2xl p-6 border border-gray-700 max-w-sm w-full mx-4 text-center"
      >
        <div class="text-3xl mb-3">🔒</div>
        <h3 class="text-lg font-bold mb-2">Match privé</h3>
        <p class="text-gray-400 text-sm mb-4">
          Entre le code d'accès pour rejoindre ce match
        </p>
        <input
          id="input-code-match"
          type="text"
          placeholder="Ex: AB12CD34"
          maxlength="8"
          class="w-full bg-gray-800 text-white rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-indigo-500 text-center tracking-widest uppercase mb-4"
        />
        <div class="flex gap-3">
          <button
            onclick="fermerModalCodeMatch()"
            class="flex-1 bg-gray-700 hover:bg-gray-600 text-white font-semibold py-2 rounded-lg transition"
          >
            Annuler
          </button>
          <button
            onclick="rejoindreMatchAvecCode()"
            class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 rounded-lg transition"
          >
            Rejoindre
          </button>
        </div>
        <p id="code-error-match" class="text-red-400 text-sm mt-3 hidden"></p>
      </div>
    </div>

    <!-- Navbar -->
    <nav
      class="bg-gray-900 px-6 py-4 flex justify-between items-center border-b border-gray-800"
    >
      <h1 class="text-xl font-bold text-indigo-400">Thinkless</h1>
      <div class="flex items-center gap-4">
        <a
          href="/ligues.html"
          class="text-gray-400 hover:text-white text-sm transition"
          >Ligues</a
        >
        <a
          href="/profil.html"
          class="text-gray-400 hover:text-white text-sm transition"
          >Mon profil</a
        >
        <button
          onclick="logout()"
          class="text-sm text-red-400 hover:text-red-300 transition"
        >
          Déconnexion
        </button>
      </div>
    </nav>

    <!-- Contenu -->
    <main class="max-w-4xl mx-auto px-4 py-8">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold">Matchs disponibles</h2>
        <div class="flex gap-3">
          <a
            href="/creer-ligue.html"
            class="bg-gray-700 hover:bg-gray-600 text-white text-sm font-semibold px-4 py-2 rounded-lg transition"
          >
            + Créer une ligue
          </a>
          <a
            href="/creer-match.html"
            class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-4 py-2 rounded-lg transition"
          >
            + Créer un match
          </a>
        </div>
      </div>

      <div class="flex gap-3 mb-6">
        <input
          id="filtre-ville"
          type="text"
          placeholder="Filtrer par ville..."
          class="bg-gray-800 text-white rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-indigo-500 flex-1"
        />
        <button
          onclick="loadMatchs()"
          class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-4 py-2 rounded-lg transition"
        >
          Rechercher
        </button>
        <button
          onclick="
            document.getElementById('filtre-ville').value = '';
            loadMatchs();
          "
          class="bg-gray-700 hover:bg-gray-600 text-white text-sm px-4 py-2 rounded-lg transition"
        >
          Tout voir
        </button>
      </div>

      <!-- Liste des matchs -->
      <div id="matchs-list" class="grid gap-4">
        <p class="text-gray-500">Chargement...</p>
      </div>
    </main>

    <script>
      const token = localStorage.getItem("token");
      if (!token) window.location.href = "/login.html";

      function logout() {
        localStorage.clear();
        window.location.href = "/accueil.html";
      }

      function ouvrirModalCodeMatch() {
        document.getElementById("input-code-match").value = "";
        document.getElementById("code-error-match").classList.add("hidden");
        document.getElementById("modal-code-match").classList.remove("hidden");
      }

      function fermerModalCodeMatch() {
        document.getElementById("modal-code-match").classList.add("hidden");
      }

      async function rejoindreMatchAvecCode() {
        const code = document
          .getElementById("input-code-match")
          .value.trim()
          .toUpperCase();
        const err = document.getElementById("code-error-match");
        err.classList.add("hidden");

        if (!code) {
          err.textContent = "Entre un code";
          err.classList.remove("hidden");
          return;
        }

        const res = await fetch("/api/matchs/rejoindre-code", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`,
          },
          body: JSON.stringify({ code_acces: code }),
        });
        const data = await res.json();

        if (res.ok) {
          fermerModalCodeMatch();
          window.location.href = `/match.html?id=${data.match_id}`;
        } else {
          err.textContent = data.message;
          err.classList.remove("hidden");
        }
      }

      async function loadMatchs() {
        const ville = document.getElementById("filtre-ville").value;
        const url = ville
          ? `/api/matchs?localisation=${encodeURIComponent(ville)}`
          : "/api/matchs";

        const res = await fetch(url, {
          headers: { Authorization: `Bearer ${token}` },
        });
        const matchs = await res.json();
        const container = document.getElementById("matchs-list");

        if (matchs.length === 0) {
          container.innerHTML =
            '<p class="text-gray-500">Aucun match disponible pour le moment.</p>';
          return;
        }

        container.innerHTML = matchs
          .map(
            (m) => `
        <div class="bg-gray-900 rounded-xl p-5 border border-gray-800 hover:border-indigo-500 transition">
          <div class="flex justify-between items-start">
            <div>
              <div class="flex items-center gap-2 mb-1">
                <span class="text-xs text-indigo-400 font-semibold uppercase">${m.sport}</span>
                ${m.prive ? '<span class="text-xs bg-gray-800 text-gray-400 px-2 py-0.5 rounded-full">🔒 Privé</span>' : ""}
              </div>
              <h3 class="text-lg font-bold">${m.titre || "Match sans titre"}</h3>
              <p class="text-gray-400 text-sm mt-1">📍 ${m.localisation || "Lieu non précisé"}</p>
              <p class="text-gray-400 text-sm">📅 ${new Date(m.date_heure).toLocaleString("fr-FR")}</p>
              <p class="text-gray-500 text-xs mt-2">Créé par <span class="text-white">${m.createur}</span></p>
            </div>
            <div class="flex flex-col gap-2">
              <button onclick="window.location.href='/match.html?id=${m.id}'"
                class="bg-gray-700 hover:bg-gray-600 text-white text-sm px-4 py-2 rounded-lg transition">
                Voir
              </button>
              ${
                m.prive
                  ? `<button onclick="ouvrirModalCodeMatch()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm px-4 py-2 rounded-lg transition">🔒 Rejoindre</button>`
                  : `<button onclick="rejoindre(${m.id})" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm px-4 py-2 rounded-lg transition">Rejoindre</button>`
              }
            </div>
          </div>
        </div>
      `,
          )
          .join("");
      }

      async function rejoindre(id) {
        const res = await fetch(`/api/matchs/${id}/rejoindre`, {
          method: "POST",
          headers: { Authorization: `Bearer ${token}` },
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = `/match.html?id=${id}`;
        } else {
          alert(data.message);
        }
      }

      loadMatchs();
    </script>
  </body>
</html>
