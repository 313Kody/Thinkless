<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thinkless – Connexion</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-950 min-h-screen flex items-center justify-center">
    <div class="bg-gray-900 p-8 rounded-2xl shadow-lg w-full max-w-md">
      <a href="/accueil.html" class="text-indigo-400 text-sm mb-6 block"
        >← Retour</a
      >
      <h1 class="text-3xl font-bold text-white mb-2 text-center">Thinkless</h1>
      <p class="text-gray-400 text-center mb-8">Connexion à ton compte</p>

      <div class="mb-4">
        <label class="block text-gray-400 text-sm mb-1">Email</label>
        <input
          id="email"
          type="email"
          placeholder="ton@email.com"
          class="w-full bg-gray-800 text-white rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-indigo-500"
        />
      </div>
      <div class="mb-6">
        <label class="block text-gray-400 text-sm mb-1">Mot de passe</label>
        <input
          id="mot_de_passe"
          type="password"
          placeholder="••••••••••••"
          class="w-full bg-gray-800 text-white rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-indigo-500"
        />
      </div>

      <button
        onclick="login()"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 rounded-lg transition"
      >
        Se connecter
      </button>

      <p id="error" class="text-red-400 text-sm mt-3 text-center hidden"></p>

      <p class="text-center text-gray-500 text-sm mt-6">
        Pas encore de compte ?
        <a href="/register.html" class="text-indigo-400 hover:text-indigo-300"
          >S'inscrire</a
        >
      </p>
    </div>

    <script>
      if (localStorage.getItem("token")) window.location.href = "/index.html";

      async function login() {
        const email = document.getElementById("email").value;
        const mot_de_passe = document.getElementById("mot_de_passe").value;
        const err = document.getElementById("error");

        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, mot_de_passe }),
        });
        const data = await res.json();

        if (res.ok) {
          localStorage.setItem("token", data.token);
          localStorage.setItem("user", JSON.stringify(data.user));
          window.location.href = "/index.html";
        } else {
          err.textContent = data.message;
          err.classList.remove("hidden");
        }
      }
    </script>
  </body>
</html>
