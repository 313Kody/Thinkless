<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thinkless – Connexion</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-950 min-h-screen flex items-center justify-center">
    <div class="bg-gray-900 p-8 rounded-2xl shadow-lg w-full max-w-md">
      <h1 class="text-3xl font-bold text-white mb-2 text-center">Thinkless</h1>
      <p class="text-gray-400 text-center mb-8">Sport & E-sport</p>

      <!-- Tabs -->
      <div class="flex mb-6 bg-gray-800 rounded-lg p-1">
        <button
          onclick="showTab('login')"
          id="tab-login"
          class="flex-1 py-2 rounded-md text-sm font-medium transition bg-indigo-600 text-white"
        >
          Connexion
        </button>
        <button
          onclick="showTab('register')"
          id="tab-register"
          class="flex-1 py-2 rounded-md text-sm font-medium transition text-gray-400"
        >
          Inscription
        </button>
      </div>

      <!-- Login -->
      <div id="form-login">
        <div class="mb-4">
          <label class="block text-gray-400 text-sm mb-1">Email</label>
          <input
            id="login-email"
            type="email"
            placeholder="boris@test.com"
            class="w-full bg-gray-800 text-white rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-indigo-500"
          />
        </div>
        <div class="mb-6">
          <label class="block text-gray-400 text-sm mb-1">Mot de passe</label>
          <input
            id="login-password"
            type="password"
            placeholder="••••••••"
            class="w-full bg-gray-800 text-white rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-indigo-500"
          />
        </div>
        <button
          onclick="login()"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 rounded-lg transition"
        >
          Se connecter
        </button>
        <p
          id="login-error"
          class="text-red-400 text-sm mt-3 text-center hidden"
        ></p>
      </div>

      <!-- Register -->
      <div id="form-register" class="hidden">
        <div class="mb-4">
          <label class="block text-gray-400 text-sm mb-1">Pseudo</label>
          <input
            id="reg-pseudo"
            type="text"
            placeholder="TonPseudo"
            class="w-full bg-gray-800 text-white rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-indigo-500"
          />
        </div>
        <div class="mb-4">
          <label class="block text-gray-400 text-sm mb-1">Email</label>
          <input
            id="reg-email"
            type="email"
            placeholder="boris@test.com"
            class="w-full bg-gray-800 text-white rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-indigo-500"
          />
        </div>
        <div class="mb-4">
          <label class="block text-gray-400 text-sm mb-1">Mot de passe</label>
          <input
            id="reg-password"
            type="password"
            placeholder="••••••••"
            class="w-full bg-gray-800 text-white rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-indigo-500"
          />
        </div>
        <div class="mb-6">
          <label class="block text-gray-400 text-sm mb-1">Localisation</label>
          <input
            id="reg-localisation"
            type="text"
            placeholder="Paris"
            class="w-full bg-gray-800 text-white rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-indigo-500"
          />
        </div>
        <button
          onclick="register()"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 rounded-lg transition"
        >
          Créer mon compte
        </button>
        <p
          id="reg-error"
          class="text-red-400 text-sm mt-3 text-center hidden"
        ></p>
      </div>
    </div>

    <script>
      function showTab(tab) {
        document
          .getElementById("form-login")
          .classList.toggle("hidden", tab !== "login");
        document
          .getElementById("form-register")
          .classList.toggle("hidden", tab !== "register");
        document.getElementById("tab-login").className =
          `flex-1 py-2 rounded-md text-sm font-medium transition ${tab === "login" ? "bg-indigo-600 text-white" : "text-gray-400"}`;
        document.getElementById("tab-register").className =
          `flex-1 py-2 rounded-md text-sm font-medium transition ${tab === "register" ? "bg-indigo-600 text-white" : "text-gray-400"}`;
      }

      async function login() {
        const email = document.getElementById("login-email").value;
        const mot_de_passe = document.getElementById("login-password").value;
        const err = document.getElementById("login-error");

        try {
          const res = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, mot_de_passe }),
          });
          const data = await res.json();

          if (res.ok) {
            localStorage.setItem("token", data.token);
            localStorage.setItem("user", JSON.stringify(data.user));
            window.location.href = "/index.html";
          } else {
            err.textContent = data.message || "Erreur serveur";
            err.classList.remove("hidden");
          }
        } catch (error) {
          err.textContent =
            "Erreur réseau : impossible de contacter le serveur.";
          err.classList.remove("hidden");
          console.error("Login fetch error:", error);
        }
      }

      const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,}$/;
      if (!regex.test(mot_de_passe)) {
        err.textContent =
          "Mot de passe trop faible (8 car. min, majuscule, chiffre, caractère spécial)";
        err.classList.remove("hidden");
        return;
      }

      async function register() {
        const pseudo = document.getElementById("reg-pseudo").value;
        const email = document.getElementById("reg-email").value;
        const mot_de_passe = document.getElementById("reg-password").value;
        const localisation = document.getElementById("reg-localisation").value;
        const err = document.getElementById("reg-error");

        try {
          const res = await fetch("/api/auth/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ pseudo, email, mot_de_passe, localisation }),
          });
          const data = await res.json();

          if (res.ok) {
            // Connexion automatique après inscription réussie
            const loginRes = await fetch("/api/auth/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email, mot_de_passe }),
            });
            const loginData = await loginRes.json();

            if (loginRes.ok) {
              localStorage.setItem("token", loginData.token);
              localStorage.setItem("user", JSON.stringify(loginData.user));
              window.location.href = "/index.html";
            } else {
              // En cas d'erreur de connexion auto, afficher l'onglet login
              showTab("login");
            }
          } else {
            err.textContent = data.message || "Erreur serveur";
            err.classList.remove("hidden");
          }
        } catch (error) {
          err.textContent =
            "Erreur réseau : impossible de contacter le serveur.";
          err.classList.remove("hidden");
          console.error("Register fetch error:", error);
        }
      }
    </script>
  </body>
</html>
