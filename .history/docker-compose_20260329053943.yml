services:
  # Le serveur Web pour Thinkless
  web-thinkless:
    image: php:8.2-apache
    container_name: thinkless-web
    ports:
      - "81:80" # Accessible sur http://localhost:81
    volumes:
      - .:/var/www/html
    command: >
      sh -c "docker-php-ext-install pdo pdo_mysql && a2enmod rewrite && apache2-foreground"

  # La base de données pour Thinkless
  db-thinkless:
    image: mysql:8.0
    container_name: thinkless-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: thinkless_db
    ports:
      - "3307:3306" # Port 3307 pour ne pas gêner le projet F1

  # phpMyAdmin pour Thinkless
  phpmyadmin-thinkless:
    image: phpmyadmin
    container_name: thinkless-pma
    ports:
      - "8081:80" # Accessible sur http://localhost:8081
    environment:
      PMA_HOST: db-thinkless
