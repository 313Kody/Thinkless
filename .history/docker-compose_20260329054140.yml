services:
  web-thinkless:
    image: php:8.2-apache
    container_name: thinkless-web
    ports:
      - "81:80"
    volumes:
      - .:/var/www/html
    networks:
      - f1_network # On rejoint le réseau du premier projet

  db-thinkless:
    image: mysql:8.0
    container_name: thinkless-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: thinkless_db
    networks:
      - f1_network

networks:
  f1_network:
    external: true # On dit à Docker que ce réseau existe déjà
